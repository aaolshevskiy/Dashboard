<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CRM Об'єкти</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;min-height:100vh}
body{
  font-family:'Caveat',cursive;
  background:#b8b8b8;
  min-height:100vh;
  padding:16px;
  display:flex;align-items:flex-start;justify-content:center;
}

/* ── BOARD ── */
.board-outer{
  width:100%;max-width:1440px;
  background:#a8a8a8;
  border-radius:6px;padding:12px;
  box-shadow:0 4px 28px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,.15);
  position:relative;
}
.board-outer::before{content:'';position:absolute;inset:0;border-radius:6px;border:2px solid rgba(255,255,255,.18);pointer-events:none;z-index:10}
.corner{position:absolute;width:26px;height:26px;z-index:20}
.corner.tl{top:6px;left:6px;border-top:4px solid #777;border-left:4px solid #777;border-radius:3px 0 0 0}
.corner.tr{top:6px;right:6px;border-top:4px solid #777;border-right:4px solid #777;border-radius:0 3px 0 0}
.corner.bl{bottom:6px;left:6px;border-bottom:4px solid #777;border-left:4px solid #777;border-radius:0 0 0 3px}
.corner.br{bottom:6px;right:6px;border-bottom:4px solid #777;border-right:4px solid #777;border-radius:0 0 3px 0}
.magnet{position:absolute;width:16px;height:16px;border-radius:50%;z-index:20;background:radial-gradient(circle at 35% 35%,#d0d8e0,#6a7a88);border:2px solid #556070;box-shadow:0 2px 4px rgba(0,0,0,.4),inset 0 1px 2px rgba(255,255,255,.3)}
.magnet.tm{top:3px;left:50%;transform:translateX(-50%)}
.magnet.bm{bottom:3px;left:50%;transform:translateX(-50%)}
.magnet.lm{left:3px;top:50%;transform:translateY(-50%)}
.magnet.rm{right:3px;top:50%;transform:translateY(-50%)}

.board-inner{
  background:#f8f7f2;
  border-radius:3px;
  padding:20px 24px 0;
  min-height:calc(100vh - 56px);
  display:flex;flex-direction:column;
  position:relative;
  box-shadow:inset 0 0 40px rgba(0,0,0,.03);
}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.board-title{font-size:32px;font-weight:700;color:#1a1a1a}
.topbar-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.sync-status{font-size:17px;color:#bbb}
.sync-status.ok{color:#2a7a3a}
.sync-status.err{color:#c0392b}
.sync-status.syncing{color:#8a6a1a}
.add-btn{font-family:'Caveat',cursive;font-size:20px;font-weight:600;padding:4px 18px;background:transparent;border:2.5px solid #1a1a1a;border-radius:3px;color:#1a1a1a;cursor:pointer}
.add-btn:hover{background:rgba(0,0,0,.04)}

/* ── LAYOUT: 2/3 left + 1/3 right ── */
.board-body{
  flex:1;
}
.objects-layout{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:0 40px;
  align-items:start;
}
.objects-col{}
@media(max-width:700px){
  .objects-layout{grid-template-columns:1fr}
}

/* ── LIST ── */
.list-item-wrap{margin-bottom:2px}
.list-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:2px 0;line-height:1.4}
.list-row-right{flex-shrink:0;margin-left:auto;padding-left:6px}
.note-icon-btn{font-family:'Caveat',cursive;font-size:20px;color:#ccc;cursor:pointer;border:none;background:transparent;padding:0 2px;line-height:1;vertical-align:middle}
.note-icon-btn:hover{color:#1a1a8a}
.note-add-under{display:flex;align-items:center;gap:6px;margin-left:28px;margin-top:3px;margin-bottom:4px}
.note-add-under input{
  font-family:'Caveat',cursive;font-size:20px;
  border:none;background:transparent;
  outline:none;color:#1a1a1a;flex:1;min-width:100px;padding:1px 2px;
}
.note-add-under input::placeholder{color:#ccc}
.note-add-under input:focus{border-bottom-color:#888}
.note-input-wrap{margin-left:28px;margin-top:2px;margin-bottom:4px}
.add-note-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.note-input-field{font-family:'Caveat',cursive;font-size:19px;border:none;background:transparent;outline:none;color:#1a1a1a;padding:1px 2px;flex:1;min-width:100px}
.note-input-field::placeholder{color:#ccc}
.note-input-field:focus{border-bottom-color:#888}
.note-submit-btn{font-family:'Caveat',cursive;font-size:18px;color:#bbb;cursor:pointer;border:none;background:transparent;padding:0 3px;flex-shrink:0}
.note-submit-btn:hover{color:#1a1a8a}
.dt-mini-btn{font-family:'Caveat',cursive;font-size:15px;color:#ccc;cursor:pointer;border:none;background:transparent;padding:0;text-decoration:underline;text-underline-offset:2px;flex-shrink:0}
.dt-mini-btn:hover{color:#888}
.list-star{font-size:28px;color:#1a1a1a;flex-shrink:0;width:24px;text-align:center}
.list-star-empty{width:24px;flex-shrink:0}
.list-star.crossed{color:#bbb;text-decoration:line-through}
.list-name{font-size:28px;font-weight:700;color:#1a1a8a;cursor:pointer;flex-shrink:0}
.list-name:hover{text-decoration:underline;text-decoration-style:wavy;text-underline-offset:4px}
.list-name.done{color:#bbb;text-decoration:line-through;text-decoration-thickness:3px}
.list-addr-wrap{font-size:24px;color:#1a1a1a}
.list-addr-wrap a{color:#1a1a1a;text-decoration:none}
.list-addr-wrap a:hover{text-decoration:underline}
.list-pack{font-size:24px;color:#1a1a1a;font-weight:700}
.inline-select{
  font-family:'Caveat',cursive;font-size:22px;color:#888;
  border:none;
  background:transparent;outline:none;cursor:pointer;
  padding:0 2px;
  /* Safari/Chrome reset */
  -webkit-appearance:none;
  -moz-appearance:none;
  appearance:none;
}
.inline-select:focus{border-bottom-color:#1a1a8a;color:#1a1a8a}
.m-badge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:2.5px solid #1a1a1a;font-size:18px;font-weight:700;color:#1a1a1a;margin-left:5px;flex-shrink:0;vertical-align:middle}
.reminder-dot{width:9px;height:9px;border-radius:50%;background:#c0392b;flex-shrink:0;display:inline-block;margin-left:3px;vertical-align:middle}

/* ── NOTES UNDER OBJECT ── */
.obj-notes{margin-left:28px;margin-bottom:2px;margin-top:0}
.obj-note-item{display:flex;align-items:baseline;gap:5px;padding:1px 0;line-height:1.4;flex-wrap:wrap;cursor:pointer}
.obj-note-item:hover .obj-note-text{text-decoration:underline;text-decoration-style:dotted}
.obj-note-text{font-size:20px;line-height:1.35;color:#1a1a1a}
.obj-note-text.c0{color:#1a1a1a}
.obj-note-text.c1{color:#1a1a1a}
.obj-note-text.overdue{color:#c0392b!important}
.obj-note-time{font-size:15px;color:#bbb;flex-shrink:0;white-space:nowrap}
.obj-note-del{font-size:12px;padding:0 4px;border:1px solid #eee;border-radius:2px;background:transparent;color:#ddd;cursor:pointer;font-family:'Caveat',cursive;flex-shrink:0}
.obj-note-del:hover{color:#c0392b;border-color:#c0392b}
/* object notes are hidden by default — shown in random notes zone */
.obj-notes-hidden{display:none}
.rn-obj-name{font-size:20px;color:#1a1a8a;flex-shrink:0;cursor:pointer;}
.obj-note-edit-input{font-family:'Caveat',cursive;font-size:20px;color:#1a1a1a;border:none;border-bottom:1.5px solid #e0e0e0;background:transparent;outline:none;flex:1;min-width:80px;padding:0 2px}
.obj-note-edit-input:focus{border-bottom-color:#1a1a8a}

.note-datetime-row{display:none;align-items:center;gap:6px;flex-wrap:wrap;margin-left:28px;margin-top:1px}
.note-datetime-row.vis{display:flex}
.note-datetime-row input[type=date]{font-family:'Caveat',cursive;font-size:16px;border:none;background:transparent;outline:none;color:#888;padding:1px 2px;width:130px}
.note-dt-label{font-size:14px;color:#bbb}

/* ── STICKER (expanded) ── */
.exp-wrap{display:none;margin:6px 0 10px 28px;position:relative;z-index:5}
.exp-wrap.open{display:block}
.exp-layout{display:flex;gap:14px;align-items:flex-start}
.exp-notes-panel{
  background:#fffacd;
  border:1px solid #e0cc3a;
  min-width:180px;max-width:260px;
  padding:12px 14px;
  box-shadow:2px 3px 10px rgba(0,0,0,.1);
  transform:rotate(0.8deg);
}
.exp-notes-label{font-size:14px;color:#b8a820;font-weight:700;margin-bottom:6px;border-bottom:0.5px solid rgba(0,0,0,.08);padding-bottom:4px}
.exp-note-item{display:flex;align-items:baseline;gap:4px;flex-wrap:wrap;padding:2px 0}
.exp-note-item.overdue-item .exp-note-text{color:#c0392b}
.exp-note-text{font-size:16px;color:#1a1a1a;cursor:pointer;flex:1}
.exp-note-text:hover{text-decoration:underline}
.exp-note-time{font-size:12px;color:#bbb;flex-shrink:0}
.sticker{
  background:#fffacd;
  border:1px solid #e0cc3a;
  width:240px;height:240px;
  padding:14px 15px 14px;
  position:relative;
  transform:rotate(-1.5deg);
  box-shadow:3px 4px 14px rgba(0,0,0,.14),inset 0 -2px 0 rgba(0,0,0,.04);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sticker::before{content:'';position:absolute;top:0;left:0;right:0;height:7px;background:linear-gradient(to bottom,rgba(200,180,30,.3),transparent);pointer-events:none}
.sticker-title{font-size:19px;font-weight:700;color:#1a1a1a;border-bottom:0.5px solid rgba(0,0,0,.08);padding-bottom:5px;margin-bottom:6px;flex-shrink:0}
.sticker-fields{display:flex;flex-direction:column;gap:3px;flex:1;overflow:hidden}
.sticker-row{display:flex;align-items:baseline;gap:4px;flex-wrap:wrap}
.sticker-label{font-size:13px;color:#b8a820;flex-shrink:0}
.sticker-val{font-size:17px;color:#1a1a1a;font-weight:600}
.sticker-select{
  font-family:'Caveat',cursive;font-size:16px;color:#1a1a1a;
  border:none;border-bottom:0.5px solid rgba(0,0,0,.1);
  background:transparent;outline:none;cursor:pointer;font-weight:600;max-width:130px;
  -webkit-appearance:none;-moz-appearance:none;appearance:none;
}
.sticker-select:focus{border-bottom-color:#8a7000}
.sticker-input{font-family:'Caveat',cursive;font-size:16px;color:#1a1a1a;border:none;border-bottom:0.5px solid rgba(0,0,0,.1);background:transparent;outline:none;width:100%}
.sticker-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
.sticker-link{font-size:15px;color:#8a7000;text-decoration:none;border-bottom:1px solid #c8a820}
.sticker-link:hover{opacity:.7}
.sticker-divider{border:none;border-top:0.5px solid rgba(0,0,0,.08);margin:5px 0}
.sticker-actions{display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}
.sticker-btn{font-family:'Caveat',cursive;font-size:14px;padding:2px 8px;border:1.5px solid rgba(0,0,0,.15);border-radius:3px;background:rgba(255,255,255,.5);color:#555;cursor:pointer;white-space:nowrap}
.sticker-btn:hover{background:rgba(255,255,255,.85)}
.sticker-btn.red:hover{color:#c0392b;border-color:#c0392b}
.sticker-btn.col{font-size:13px;color:#aaa}

/* ── TOP RANDOM NOTES STRIP ── */
.random-notes-zone{
  margin-bottom:20px;
  padding-bottom:14px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0 40px;
}
.random-notes-col{}
.random-notes-list{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.random-note-item{
  display:inline-flex;align-items:baseline;gap:4px;flex-wrap:wrap;
  padding:2px 0;width:100%;
}
.random-note-text{
  font-size:22px;color:#1a1a1a;line-height:1.35;cursor:pointer;flex-shrink:0;
  outline:none;
}
.random-note-text.overdue{color:#c0392b}
.random-note-time{font-size:15px;color:#bbb;flex-shrink:0;white-space:nowrap}
.random-note-del{font-size:12px;padding:0 4px;border:1px solid #eee;border-radius:2px;background:transparent;color:#ddd;cursor:pointer;font-family:'Caveat',cursive;flex-shrink:0}
.random-note-del:hover{color:#c0392b;border-color:#c0392b}

.random-add-row{display:flex;align-items:center;gap:8px}
.random-add-input{
  font-family:'Caveat',cursive;font-size:22px;
  border:none;
  background:transparent;outline:none;color:#1a1a1a;
  flex:1;min-width:80px;padding:1px 0;
  -webkit-appearance:none;
}
.random-add-input::placeholder{color:#ccc;font-style:italic}
.random-add-btn{font-family:'Caveat',cursive;font-size:20px;color:#ccc;cursor:pointer;border:none;background:transparent;padding:0 4px}
.random-add-btn:hover{color:#1a1a8a}
.random-dt-btn{font-family:'Caveat',cursive;font-size:16px;color:#ccc;cursor:pointer;border:none;background:transparent;text-decoration:underline;text-underline-offset:2px}
.random-dt-btn:hover{color:#888}
.random-dt-row{display:none;align-items:center;gap:8px;margin-top:2px}
.random-dt-row.vis{display:flex}
.random-dt-row input[type=date]{
  font-family:'Caveat',cursive;font-size:17px;
  border:none;background:transparent;outline:none;color:#888;
  -webkit-appearance:none;appearance:none;
}
.random-dt-label{font-size:16px;color:#bbb}
/* ── HISTORY ── */
.hist-item{background:#f9f9f8;border:0.5px solid #e8e8e0;border-radius:8px;padding:10px 14px;display:flex;align-items:flex-start;gap:10px}
.hist-item.overdue-item{border-color:#F09595;background:#FCEBEB}
.hist-badge{font-size:11px;padding:2px 7px;border-radius:4px;background:#f0f0ee;color:#888;white-space:nowrap;flex-shrink:0;margin-top:3px}
.hist-badge.del{background:#FCEBEB;color:#A32D2D}
.hist-badge.note{background:#E6F1FB;color:#0C447C}
.hist-badge.obj{background:#E1F5EE;color:#085041}
.hist-body{flex:1;min-width:0}
.hist-name{font-size:17px;font-weight:600;color:#1a1a1a;line-height:1.3}
.hist-meta{font-size:13px;color:#aaa;margin-top:2px}
.hist-restore{font-family:'Caveat',cursive;font-size:15px;padding:3px 10px;border:1.5px solid #1a1a8a;border-radius:4px;background:transparent;color:#1a1a8a;cursor:pointer;flex-shrink:0;white-space:nowrap}
.hist-restore:hover{background:rgba(26,26,138,.06)}

/* ── NOTE REMINDER MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
#addModal{cursor:default}
#addModal .modal{cursor:auto}
.modal{background:#fff;border:1.5px solid #e0e0e0;border-radius:8px;padding:22px;width:400px;max-width:95vw;display:flex;flex-direction:column;gap:11px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.14);font-family:'Caveat',cursive}
.modal-sm{width:340px}
.modal-title{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
.fsec{font-size:13px;color:#bbb;margin-top:4px;padding-bottom:3px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #f0f0f0}
.form-row{display:flex;flex-direction:column;gap:3px}
.form-row label{font-size:16px;color:#888}
.form-row input,.form-row select,.form-row textarea{width:100%;font-size:19px;font-family:'Caveat',cursive;border:none;border-bottom:1.5px solid #e0e0e0;background:transparent;color:#1a1a1a;padding:3px 2px;outline:none;-webkit-appearance:none;-moz-appearance:none;appearance:none;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-bottom-color:#1a1a8a}
.form-row textarea{resize:vertical;min-height:44px;border:1.5px solid #e0e0e0;border-radius:4px;padding:5px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.toggle-group{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:4px 0}
.tpill-lbl{display:flex;align-items:center;gap:4px;cursor:pointer}
.tpill-lbl input[type=checkbox]{display:none}
.tpill{padding:3px 12px;border:1.5px solid #ddd;border-radius:20px;font-family:'Caveat',cursive;font-size:17px;color:#888;cursor:pointer;transition:all .15s}
.tpill-lbl input:checked+.tpill.star{border-color:#f0a500;color:#f0a500;background:rgba(240,165,0,.08)}
.tpill-lbl input:checked+.tpill.done{border-color:#888;color:#888;text-decoration:line-through;background:rgba(0,0,0,.04)}
.tpill-lbl input:checked+.tpill.masters{border-color:#1a1a1a;color:#1a1a1a;background:rgba(0,0,0,.04)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;padding-top:10px;border-top:1px solid #f0f0f0}
.btn-cancel{font-family:'Caveat',cursive;font-size:18px;padding:4px 14px;border:1.5px solid #ddd;border-radius:6px;background:transparent;color:#888;cursor:pointer}
.btn-cancel:hover{background:#f8f8f8}
.btn-save{font-family:'Caveat',cursive;font-size:18px;font-weight:700;padding:4px 18px;border:1.5px solid #1a1a8a;border-radius:6px;background:transparent;color:#1a1a8a;cursor:pointer}
.btn-save:hover{background:rgba(26,26,138,.05)}
.btn-save:disabled{border-color:#ddd;color:#ddd;cursor:not-allowed}
.err-msg{font-size:15px;color:#c0392b;display:none}

/* ── MARKER DRAWING AT BOTTOM ── */
.board-drawing{display:flex;justify-content:center;padding:10px 0 8px;margin-top:auto}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .sticker{width:200px;height:200px}
  .board-title{font-size:26px}
  .list-name{font-size:24px}
}
@media(max-width:600px){
  body{padding:8px}
  .board-inner{padding:14px 14px 0}
  .board-body{grid-template-columns:1fr}
  .sticker{width:95%;height:auto;min-height:180px}
}
</style>
</head>
<body>
<div class="board-outer">
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div class="magnet tm"></div><div class="magnet bm"></div>
  <div class="magnet lm"></div><div class="magnet rm"></div>

  <div class="board-inner">
    <div class="topbar">
      <div class="board-title">Мій дашборд</div>
      <div class="topbar-right">
        <div class="sync-status" id="syncStatus"><span id="syncText">завантаження...</span></div>
        <button class="add-btn" onclick="openHistoryModal()" style="background:transparent;border-color:#aaa;color:#888;margin-right:4px">📋 Історія</button>
        <button class="add-btn" onclick="openAddModal()">+ Додати об'єкт</button>
      </div>
    </div>

    <div class="board-body">
            <!-- RANDOM NOTES TOP STRIP — 2 columns -->
      <div class="random-notes-zone" id="randomNotesZone">
        <!-- LEFT COLUMN -->
        <div class="random-notes-col">
          <div class="random-notes-list" id="randomNotesList0"></div>
          <div class="random-add-row">
            <input class="random-add-input" id="randomAddInput0" placeholder="нова нотатка..."
              onkeydown="if(event.key==='Enter')addRandomNote(0)">
            <button class="random-add-btn" onclick="addRandomNote(0)">↵</button>
            <button class="random-dt-btn" id="randomDtBtn0" onclick="toggleRandomDt(0)">+ нагадати</button>
          </div>
          <div class="random-dt-row" id="randomDtRow0">
            <span class="random-dt-label">коли:</span>
            <input type="date" id="randomDtDate0">
            <span class="random-dt-label">(9:00)</span>
          </div>
        </div>
        <!-- RIGHT COLUMN -->
        <div class="random-notes-col">
          <div class="random-notes-list" id="randomNotesList1"></div>
          <div class="random-add-row">
            <input class="random-add-input" id="randomAddInput1" placeholder="нова нотатка..."
              onkeydown="if(event.key==='Enter')addRandomNote(1)">
            <button class="random-add-btn" onclick="addRandomNote(1)">↵</button>
            <button class="random-dt-btn" id="randomDtBtn1" onclick="toggleRandomDt(1)">+ нагадати</button>
          </div>
          <div class="random-dt-row" id="randomDtRow1">
            <span class="random-dt-label">коли:</span>
            <input type="date" id="randomDtDate1">
            <span class="random-dt-label">(9:00)</span>
          </div>
        </div>
      </div>
      <!-- OBJECTS LIST -->
      <div style="font-size:26px;font-weight:700;color:#1a1a1a;margin:14px 0 8px;padding-top:4px;">Об'єкти в роботі</div>
      <div class="objects-layout">
        <div class="objects-col" id="colLeft"></div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbzYvYHPHj6p5wRP6o_nfVkHJzVZZQHoJBLe9FwbGNdZKZZ-RGCwitHfxj75qfduf8tW/exec";
const MONTHS_GEN=['січня','лютого','березня','квітня','травня','червня','липня','серпня','вересня','жовтня','листопада','грудня'];
const STATUS_LABELS={active:'В роботі',launch:'На запуск',finishing:'Закінчуємо',pause:'На паузі',frozen:'Заморожено',done:'Закінчено'};
const STAGES=['Підготовка','Розробка проєкту','Етап 1','Етап 2','Етап 3','Етап 4','Фінішуємо'];
const STATUSES=['active','launch','finishing','pause','frozen','done'];

let objects=[];
let stickyNotes=[];
let editIdx=null;
let expandedId=null;
let reminderCtx=null; // {objIdx, noteIdx}

function fmtDateShort(iso){if(!iso)return null;const[y,m,d]=iso.split('-');return parseInt(d)+' '+MONTHS_GEN[parseInt(m)-1];}
function fmtDT(iso){if(!iso)return'';const d=new Date(iso);return d.getDate()+' '+MONTHS_GEN[d.getMonth()]+', '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function mapsUrl(addr){return'https://www.google.com/maps/search/'+encodeURIComponent(addr);}
function isNoteActive(n){return n.time&&n.text&&new Date()>=new Date(n.time);}
function hasActiveReminder(o){return(o.notes||[]).some(isNoteActive);}

function setSyncStatus(state,text){document.getElementById('syncStatus').className='sync-status '+state;document.getElementById('syncText').textContent=text;}

// ── HISTORY ──────────────────────────────────────────────
const MAX_HISTORY = 50;
let actionLog = [];

function addHistory(entry){
  // entry: {type:'note'|'obj'|'randomNote', action:'delete'|'edit', label, data, restore}
  entry.time = new Date().toISOString();
  actionLog.unshift(entry);
  if(actionLog.length > MAX_HISTORY) actionLog.pop();
  try{ localStorage.setItem('crm_history', JSON.stringify(actionLog)); }catch{}
}

function loadActionLog(){
  try{ actionLog = JSON.parse(localStorage.getItem('crm_history')||'[]'); }catch{ actionLog=[]; }
}

function openHistoryModal(){
  renderHistoryList();
  document.getElementById('historyModal').classList.add('open');
}
function closeHistoryModal(){
  document.getElementById('historyModal').classList.remove('open');
}

function renderHistoryList(){
  const list = document.getElementById('historyList');
  const empty = document.getElementById('historyEmpty');
  list.innerHTML = '';
  if(!actionLog.length){ list.style.display='none'; empty.style.display='block'; return; }
  list.style.display='flex'; empty.style.display='none';
  actionLog.forEach((h,idx)=>{
    const d = new Date(h.time);
    const timeStr = d.toLocaleDateString('uk-UA',{day:'2-digit',month:'2-digit'}) + ' ' +
                    d.toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'});
    const badgeClass = h.action==='delete' ? 'del' : (h.type==='obj' ? 'obj' : 'note');
    const badgeText = h.action==='delete' ? 'видалено' : 'змінено';
    const typeText = h.type==='obj' ? 'Об\'єкт' : h.type==='note' ? 'Замітка' : 'Нотатка';
    const item = document.createElement('div');
    item.className = 'hist-item';
    item.innerHTML = `
      <span class="hist-badge ${badgeClass}">${badgeText}</span>
      <div class="hist-body">
        <div class="hist-name">${h.label||'—'}</div>
        <div class="hist-meta">${typeText} · ${timeStr}${h.parentName?' · '+h.parentName:''}</div>
      </div>
      <button class="hist-restore" onclick="restoreFromHistory(${idx})">↩ Відновити</button>`;
    list.appendChild(item);
  });
}

async function restoreFromHistory(idx){
  const h = actionLog[idx];
  if(!h) return;
  try{
    if(h.type==='obj'){
      // Restore deleted object
      const obj = {...h.data};
      obj.id = ''; // get new id
      await apiSave(obj);
      objects.push(parseObj(obj));
      sortObjects();
      render();
    } else if(h.type==='note'){
      // Restore note to object
      const ri = objects.findIndex(o=>String(o.id)===String(h.objId));
      if(ri>=0){
        if(!objects[ri].notes) objects[ri].notes=[];
        objects[ri].notes.push(h.data);
        // Find slot in DOM
        const wrap = [...document.querySelectorAll('[data-objid]')].find(w=>String(w.dataset.objid)===String(h.objId));
        const slot = wrap ? parseInt(wrap.id.replace('wrap-','')) : ri;
        const notesEl = document.getElementById('notes-'+slot);
        if(notesEl) notesEl.innerHTML = buildNotesHTML(objects[ri], slot);
        await apiSave(objects[ri]);
      }
    } else if(h.type==='randomNote'){
      // Restore random note
      const sn = {...h.data};
      sn.id = 'sticky_'+Date.now();
      stickyNotes.push(sn);
      renderRandomNotes();
      await apiSave(sn);
    }
    // Remove from actionLog after restore
    actionLog.splice(idx,1);
    try{ localStorage.setItem('crm_history', JSON.stringify(actionLog)); }catch{}
    renderHistoryList();
  }catch(err){ console.error('restoreFromHistory error:',err); }
}

document.getElementById('historyModal').addEventListener('click',function(e){
  if(e.target===this) closeHistoryModal();
});

function parseBool(v){ return v===true||v==='true'||v==='TRUE'||v===1||v==='1'; }

function parseObj(o){
  return {
    ...o,
    inwork:    parseBool(o.inwork),
    completed: parseBool(o.completed),
    masters:   parseBool(o.masters),
    notes: Array.isArray(o.notes) ? o.notes : (()=>{ try{ return JSON.parse(o.notes||'[]'); }catch{ return []; } })()
  };
}

async function fetchWithTimeout(url, opts={}, ms=10000){
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(),ms);
  try{
    const res=await fetch(url,{...opts,signal:controller.signal});
    clearTimeout(timer);
    return res;
  }catch(e){clearTimeout(timer);throw e;}
}

async function apiGet(){
  console.log('[CRM] apiGet called');
  setSyncStatus('syncing','завантаження...');
  try{
    const res=await fetchWithTimeout(API_URL+'?action=getAll',{redirect:'follow'},12000);
    const data=await res.json();
    const stickies=[];
    const objs=[];
    (data||[]).forEach(o=>{
      if(String(o.id).startsWith('sticky_')){
        const sn={...o};
        sn.col=parseInt(sn.col)||parseInt(sn.addr)||0;
        sn.notes=Array.isArray(sn.notes)?sn.notes:(()=>{try{return JSON.parse(sn.notes||'[]');}catch{return[];}})();
        stickies.push(sn);
      } else {
        objs.push(parseObj(o));
      }
    });
    objects=objs;
    stickyNotes=stickies;
    setSyncStatus('ok','збережено ✓');
  }catch(e){
    if(e&&e.name==='AbortError'){
      setSyncStatus('err','тайм-аут — перевірте Apps Script');
    } else {
      setSyncStatus('err','помилка з\'єднання');
    }
    console.error('[CRM] apiGet error:',e&&e.name, e&&e.message);
  }finally{
    console.log('[CRM] render, objects:', objects.length);
    render();
    renderRandomNotes();
  }
}
async function apiSave(obj){
  setSyncStatus('syncing','збереження...');
  // Always send complete canonical object — never lose fields
  const full={
    id:         obj.id||'',
    name:       obj.name||'',
    addr:       obj.addr||'',
    stage:      obj.stage||'',
    status:     obj.status||'active',
    pack:       obj.pack||'',
    area:       obj.area||'',
    inwork:     !!obj.inwork,
    completed:  !!obj.completed,
    masters:    !!obj.masters,
    mastersName:obj.mastersName||'',
    linkProject:obj.linkProject||'',
    linkFolder: obj.linkFolder||'',
    dateStart:  obj.dateStart||'',
    dateEnd:    obj.dateEnd||'',
    notes:      Array.isArray(obj.notes)?obj.notes:[]
  };
  try{
    const res=await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'save',object:full})});
    const data=await res.json();
    if(data.id) obj.id=data.id;
    setSyncStatus('ok','збережено ✓');
    return true;
  }catch(e){setSyncStatus('err','помилка збереження');return false;}
}
async function apiDelete(id){
  try{await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'delete',id})});setSyncStatus('ok','збережено ✓');}
  catch(e){setSyncStatus('err','помилка');}
}

// ── RENDER OBJECTS ──
function sortObjects(){
  const rank=o=>{
    const isCompleted = o.completed===true||o.completed==='true'||o.completed==='TRUE'||o.completed===1;
    if(isCompleted) return 6; // завершені — завжди в самому низу
    const isInwork = o.inwork===true||o.inwork==='true'||o.inwork==='TRUE'||o.inwork===1;
    const isMasters = o.masters===true||o.masters==='true'||o.masters==='TRUE'||o.masters===1;
    const notes=Array.isArray(o.notes)?o.notes:[];
    const hasOverdue=notes.some(isNoteActive);
    const hasNotes=notes.length>0;
    if(isInwork&&isMasters){
      if(hasOverdue) return 0;
      if(hasNotes)   return 1;
      return 2;
    }
    if(isInwork){
      if(hasOverdue) return 0;
      if(hasNotes)   return 1;
      return 3;
    }
    if(isMasters) return 4;
    return 5;
  };
  // Stable sort with explicit numeric rank + original-index tiebreaker
  const withIdx=objects.map((o,idx)=>({o,idx,r:rank(o)}));
  withIdx.sort((a,b)=> a.r-b.r || a.idx-b.idx);
  objects=withIdx.map(x=>x.o);
}

function objIdx(id){
  return objects.findIndex(o=>String(o.id)===String(id));
}

// Estimate row length in characters (name + addr + pack + area + stage)
function estimateRowLen(o){
  let len=0;
  if(o.inwork) len+=2;       // ☆
  if(o.masters) len+=4;      // М + circle
  if(o.name) len+=o.name.length;
  if(o.addr) len+=o.addr.length+3; // (addr)
  if(o.area) len+=String(o.area).length+3; // Xм²
  if(o.pack) len+=o.pack.length+2;
  if(o.stage) len+=o.stage.length+1;
  return len;
}

// Threshold: if row fits in 1/3 width (~40 chars), put in right col
const SHORT_THRESHOLD = 38;

function render(){
  const colL=document.getElementById('colLeft');
  const colR=document.getElementById('colRight');
  if(!colL) return;
  colL.innerHTML='';
  if(colR) colR.innerHTML='';
  if(!objects.length){
    colL.innerHTML='<div style="font-size:22px;color:#ccc;font-style:italic;padding:8px 0">Немає об\'єктів...</div>';
    return;
  }
  sortObjects();
  // After sort, i is the true position in sorted array = global number
  objects.forEach((o,i)=>{
    const len=estimateRowLen(o);
    const isShort=len<=SHORT_THRESHOLD;
    const col=(isShort&&colR)?colR:colL;
    col.appendChild(buildItemWrap(o,i,i+1));
  });
  if(expandedId!==null){
    const el=document.getElementById('exp-'+expandedId);
    if(el){el.classList.add('open');el.innerHTML=buildExpanded(objects[expandedId],expandedId);}
  }
}

function buildItemWrap(o,i,globalNum){
  const wrap=document.createElement('div');
  wrap.className='list-item-wrap';wrap.id='wrap-'+i;
  wrap.dataset.objid=o.id;
  // ROW
  const row=document.createElement('div');row.className='list-row';
  // number — global sequential
  const num=document.createElement('span');
  num.style.cssText='font-size:18px;color:#ccc;flex-shrink:0;min-width:26px;text-align:right;margin-right:2px;font-weight:400';
  num.textContent=(globalNum!=null?globalNum:i+1)+'.';
  row.appendChild(num);
  // star
  const star=document.createElement('span');
  if(o.inwork){star.className='list-star'+(o.completed?' crossed':'');star.textContent='☆';}
  else{star.className='list-star-empty';}
  row.appendChild(star);
  // name
  const name=document.createElement('span');
  name.className='list-name'+(o.completed?' done':'');
  name.textContent=o.name||'—';
  name.onclick=()=>toggleExpand(i);
  row.appendChild(name);
  // address
  if(o.addr){
    const aw=document.createElement('span');aw.className='list-addr-wrap';
    aw.innerHTML=` (<a href="${mapsUrl(o.addr)}" target="_blank" onclick="event.stopPropagation()">${o.addr}</a>)`;
    row.appendChild(aw);
  }
  // area, then pack, then stage
  if(o.area){const a=document.createElement('span');a.style.cssText='font-size:22px;color:#888;flex-shrink:0';a.textContent=' '+o.area+'м²';row.appendChild(a);}
  if(o.pack){const p=document.createElement('span');p.className='list-pack';p.textContent=' '+o.pack+'.';row.appendChild(p);}
  // inline stage
  const stageSel=document.createElement('select');stageSel.className='inline-select';
  STAGES.forEach(s=>{const op=document.createElement('option');op.value=s;op.textContent=s;if(s===o.stage)op.selected=true;stageSel.appendChild(op);});
  stageSel.onchange=async()=>{objects[i].stage=stageSel.value;await apiSave(objects[i]);};
  const sw=document.createElement('span');sw.style.cssText='flex-shrink:0;margin-left:3px';sw.appendChild(stageSel);
  row.appendChild(sw);
  // M badge
  if(o.masters){const m=document.createElement('span');m.className='m-badge';m.textContent='М';row.appendChild(m);}
  // reminder dot
  if(hasActiveReminder(o)){const dot=document.createElement('span');dot.className='reminder-dot';row.appendChild(dot);}

  // INLINE ADD NOTE — right side of row
  // No icon in row — pencil goes below notes

  wrap.appendChild(row);

  // STICKER — right after the row, before notes
  const expDiv=document.createElement('div');expDiv.className='exp-wrap';expDiv.id='exp-'+i;
  wrap.appendChild(expDiv);

  // NOTES — only visible when there are notes
  const notesDiv=document.createElement('div');notesDiv.className='obj-notes';notesDiv.id='notes-'+i;notesDiv.innerHTML=buildNotesHTML(o,i);
  wrap.appendChild(notesDiv);

  // NOTE INPUT — hidden by default, shows below notes
  // Pencil icon + input always shown below notes (toggleable)
  const pencilBtn=document.createElement('button');
  pencilBtn.className='note-icon-btn';
  pencilBtn.style.cssText='margin-left:28px;margin-top:2px;display:block;font-size:18px';
  pencilBtn.title='Додати замітку';
  pencilBtn.textContent='✎';
  pencilBtn.onclick=e=>{e.stopPropagation();toggleNoteInput(i);};
  wrap.appendChild(pencilBtn);

  const noteInputWrap=document.createElement('div');
  noteInputWrap.className='note-input-wrap';
  noteInputWrap.id='ni-wrap-'+i;
  noteInputWrap.style.display='none';
  noteInputWrap.innerHTML=`
    <div class="add-note-row" id="addinline-${i}">
      <input class="note-input-field" type="text" id="qi-text-${i}" placeholder="нова замітка..."
        onkeydown="if(event.key==='Enter')submitQuickNote(${i})"
        onclick="event.stopPropagation()">
      <button class="note-submit-btn" onclick="event.stopPropagation();submitQuickNote(${i})">↵</button>
      <button class="dt-mini-btn" id="dt-btn-${i}" onclick="event.stopPropagation();toggleDT(${i})">+ нагадати</button>
    </div>
    <div class="note-datetime-row" id="dt-row-${i}">
      <span class="note-dt-label">нагадати:</span>
      <input type="date" id="qi-date-${i}">
      <span class="note-dt-label">(9:00)</span>
    </div>`;
  wrap.appendChild(noteInputWrap);
  return wrap;
}

function buildNotesHTML(o,i){
  const notes=o.notes||[];
  if(!notes.length) return '';
  // Sort: overdue first
  const indexed=notes.map((n,ni)=>({n,ni}))
    .sort((a,b)=>isNoteActive(b.n)-isNoteActive(a.n));
  let html='';
  indexed.forEach(({n,ni})=>{
    const active=isNoteActive(n);
    const cl=active?'overdue':'';
    const timeStr=n.time?`<span class="obj-note-time">${fmtDT(n.time)}</span>`:'';
    // Notes are collapsed under object — click to expand/edit via random zone
    html+=`<div class="obj-note-item obj-notes-hidden" id="note-item-${i}-${ni}">
      <span class="obj-note-text ${cl}">— ${n.text}</span>
      ${timeStr}
      <button class="obj-note-del" onclick="event.stopPropagation();deleteNoteQuick(${i},${ni})">✕</button>
    </div>`;
  });
  return html;
}

}

async function saveNoteEdit(){
  try{
    const text=document.getElementById('ne-text').value.trim();
    if(!text){document.getElementById('ne-err').style.display='block';return;}
    const date=document.getElementById('ne-date').value;
    const mode=document.getElementById('noteEditModal').dataset.mode;

    if(mode==='random'){
      const sn=stickyNotes[randomEditIdx];
      sn.name=text;
      sn.notes=date?[{text,time:date+'T09:00'}]:[];
      // col preserved from original
      renderRandomNotes();
      closeNoteEditModal();
      apiSave(sn).catch(e=>console.error('save error',e));
      return;
    }

    // Edit object note
    const {ri,slot,ni}=noteEditCtx;
    objects[ri].notes[ni].text=text;
    objects[ri].notes[ni].time=date?date+'T09:00':'';
    const notesEl=document.getElementById('notes-'+slot);
    if(notesEl) notesEl.innerHTML=buildNotesHTML(objects[ri],slot);
    if(expandedId===slot){
      const el=document.getElementById('exp-'+slot);
      if(el&&el.classList.contains('open')) el.innerHTML=buildSticker(objects[ri],slot);
    }
    closeNoteEditModal();
    renderRandomNotes();
    apiSave(objects[ri]).catch(e=>console.error('save error',e));
  }catch(err){console.error('saveNoteEdit:',err);}
}

async function deleteNoteQuick(slot,ni){
  try{
    const wrap=document.getElementById('wrap-'+slot);
    const oid=wrap?wrap.dataset.objid:null;
    const ri=oid!==null?objIdx(oid):slot;
    if(ri<0||ri>=objects.length)return;
    const deletedNote = {...objects[ri].notes[ni]};
    addHistory({type:'note',action:'delete',label:deletedNote.text,parentName:objects[ri].name,objId:objects[ri].id,data:deletedNote});
    objects[ri].notes.splice(ni,1);
    const notesEl=document.getElementById('notes-'+slot);
    if(notesEl) notesEl.innerHTML=buildNotesHTML(objects[ri],slot);
    if(expandedId===slot){
      const el=document.getElementById('exp-'+slot);
      if(el&&el.classList.contains('open')) el.innerHTML=buildSticker(objects[ri],slot);
    }
    renderRandomNotes();
    apiSave(objects[ri]).catch(e=>console.error('save error',e));
  }catch(err){console.error('deleteNoteQuick error:',err);}
}

async function submitQuickNote(i){
  try{
    const wrap=document.getElementById('wrap-'+i);
    if(!wrap){console.error('wrap-'+i+' not found');return;}
    const oid=wrap.dataset.objid;
    const ri=oid?objIdx(oid):i;
    if(ri<0||ri>=objects.length){console.error('object not found for slot '+i+' oid '+oid);return;}

    const textEl=document.getElementById('qi-text-'+i);
    const text=(textEl?textEl.value:'').trim();
    if(!text)return;

    const dateEl=document.getElementById('qi-date-'+i);
    const date=dateEl?dateEl.value:'';
    const time=date?date+'T09:00':'';

    if(!Array.isArray(objects[ri].notes)) objects[ri].notes=[];
    objects[ri].notes.push({text,time});

    // Clear UI without full re-render
    if(textEl) textEl.value='';
    if(dateEl) dateEl.value='';
    const dtRow=document.getElementById('dt-row-'+i);
    const dtBtn=document.getElementById('dt-btn-'+i);
    if(dtRow) dtRow.classList.remove('vis');
    if(dtBtn) dtBtn.textContent='+ нагадати';
    const niWrap=document.getElementById('ni-wrap-'+i);
    if(niWrap) niWrap.style.display='none';

    // Update only notes block — no full render()
    const notesEl=document.getElementById('notes-'+i);
    if(notesEl) notesEl.innerHTML=buildNotesHTML(objects[ri],i);

    // Update sticker if open
    if(expandedId===i){
      const el=document.getElementById('exp-'+i);
      if(el&&el.classList.contains('open')) el.innerHTML=buildSticker(objects[ri],i);
    }

    // Refresh random notes zone to show the new note
    renderRandomNotes();

    // Save async
    apiSave(objects[ri]).catch(e=>console.error('save error',e));

  }catch(err){
    console.error('submitQuickNote error:',err);
  }
}

  const stageOpts=STAGES.map(s=>`<option value="${s}"${s===o.stage?' selected':''}>${s}</option>`).join('');
  const startStr=fmtDateShort(o.dateStart);
  const endStr=fmtDateShort(o.dateEnd);
  const linksHtml=o.linkFolder
    ?`<a class="sticker-link" href="${o.linkFolder}" target="_blank">📁 Папка Фінал</a>`:'';

  // Notes list for side panel
  const notes=o.notes||[];
  const notesHtml=notes.length
    ?notes.map((n,ni)=>{
        const active=isNoteActive(n);
        return`<div class="exp-note-item${active?' overdue-item':''}">
          <span class="exp-note-text${active?' overdue':''}" onclick="openObjNoteEdit('${o.id}',${ni})">— ${n.text}</span>

          <button class="obj-note-del" onclick="deleteObjNoteById('${o.id}',${ni})">✕</button>

        <div class="sticker-row"><span class="sticker-label">статус</span><select class="sticker-select" onchange="changeStatus(${i},this.value)">${statusOpts}</select></div>
        <div class="sticker-row"><span class="sticker-label">етап</span><select class="sticker-select" onchange="changeStage(${i},this.value)">${stageOpts}</select></div>
        ${o.mastersName?`<div class="sticker-row"><span class="sticker-label">майстри</span><span class="sticker-val" style="font-size:15px">${o.mastersName}</span></div>`:''}
        ${o.area?`<div class="sticker-row"><span class="sticker-label">площа</span><span class="sticker-val">${o.area} м²</span></div>`:''}
        ${(startStr||endStr)?`<div class="sticker-row">${startStr?`<span class="sticker-label">старт</span><span class="sticker-val" style="font-size:15px">${startStr}</span>`:''}${endStr?`<span class="sticker-label" style="margin-left:6px">фініш</span><span class="sticker-val" style="font-size:15px">${endStr}</span>`:''}</div>`:''}

      </div>

      <div class="sticker-actions">
        <button class="sticker-btn" onclick="openEditModal(${i})">✏ ред.</button>
        <button class="sticker-btn red" onclick="deleteCard(${i})">✕</button>
        <button class="sticker-btn col" onclick="closeExpand(${i})">↑</button>
      </div>

    <div class="exp-notes-panel">
      <div class="exp-notes-label">Замітки</div>

// ── RANDOM NOTES (top strip) ──
function isRandomNoteActive(sn){
  if(!sn.notes||!sn.notes.length)return false;
  return sn.notes.some(n=>n.time&&new Date()>=new Date(n.time));
}

function renderRandomNotes(){
  const list0=document.getElementById('randomNotesList0');
  const list1=document.getElementById('randomNotesList1');
  if(!list0||!list1)return;
  list0.innerHTML='';list1.innerHTML='';

  const now=new Date();
  const isOverdueSn=sn=>{
    const note=sn.notes&&sn.notes.length?sn.notes[0]:null;
    return !!(note&&note.time&&now>=new Date(note.time));
  };

  // Build unified list: pure random notes + all object notes
  // type: 'random' | 'objnote'
  const allItems=[];

  // 1. Pure random (stickyNotes)
  stickyNotes.forEach((sn,idx)=>{
    allItems.push({
      type:'random',
      idx,
      text:sn.name||'',
      objName:null,
      overdue:isOverdueSn(sn),
      time:(sn.notes&&sn.notes.length&&sn.notes[0].time)?sn.notes[0].time:'',
    });
  });

  // 2. Object notes (from all objects)
  objects.forEach(o=>{
    (o.notes||[]).forEach((n,ni)=>{
      allItems.push({
        type:'objnote',
        objId:o.id,
        ni,
        text:n.text||'',
        objName:o.name||'',
        overdue:isNoteActive(n),
        time:n.time||'',
      });
    });
  });

  // Sort: overdue first, then pure random (no obj), then obj notes
  allItems.sort((a,b)=>{
    if(b.overdue!==a.overdue) return b.overdue-a.overdue;
    const rankA = a.type==='random'?0:1;
    const rankB = b.type==='random'?0:1;
    return rankA-rankB;
  });

  // Distribute to columns by text length
  // Short (fits in 1/3 ~35 chars) → col 1, long → col 0
  const SHORT=35;
  const measureLen=item=>{
    let len=item.text.length;
    if(item.objName) len+=item.objName.length+3; // (Назва)
    if(item.time) len+=10;
    return len;
  };

  allItems.forEach((item,globalIdx)=>{
    const len=measureLen(item);
    // obj notes → always left (col 0)
    // pure random → right (col 1) only if short, else left
    const col = item.type==='objnote' ? 0 : (len<=SHORT ? 1 : 0);
    const list=col===1?list1:list0;
    const active=item.overdue;
    const timeStr=item.time?fmtDT(item.time):'';
    const suffix=item.objName?` <span style="font-size:17px;color:#aaa">(${item.objName})</span>`:'';

    const row=document.createElement('div');
    row.className='random-note-item';

    if(item.type==='random'){
      row.innerHTML=`<span class="random-note-text${active?' overdue':''}" onclick="openRandomNoteEdit(${item.idx})">— ${item.text}</span>${timeStr?`<span class="random-note-time">${timeStr}</span>`:''}<button class="random-note-del" onclick="deleteRandomNote(${item.idx})">✕</button>`;
    } else {
      row.innerHTML=`<span class="random-note-text${active?' overdue':''}" onclick="openObjNoteEdit('${item.objId}',${item.ni})">— ${item.text}</span><span class="rn-obj-name" onclick="toggleObjNoteVisible('${item.objId}',${item.ni})">(${item.objName})</span>${timeStr?`<span class="random-note-time">${timeStr}</span>`:''}<button class="random-note-del" onclick="deleteObjNoteById('${item.objId}',${item.ni})">✕</button>`;
    }
    list.appendChild(row);
  });
}

function toggleObjNoteVisible(objId,ni){
  // Find the DOM wrap for this object and show/hide that specific note
  const wrap=[...document.querySelectorAll('[data-objid]')]
    .find(w=>String(w.dataset.objid)===String(objId));
  if(!wrap) return;
  const noteItem=wrap.querySelector('#note-item-'+wrap.id.replace('wrap-','')+'\-'+ni);
  if(noteItem){
    const hidden=noteItem.classList.contains('obj-notes-hidden');
    // toggle all notes for this object first hide all, then show this one
    if(hidden){
      noteItem.classList.remove('obj-notes-hidden');
    } else {
      noteItem.classList.add('obj-notes-hidden');
    }
  } else {
    // fallback — show entire notes block
    const slot=parseInt(wrap.id.replace('wrap-',''));
    const notesEl=document.getElementById('notes-'+slot);
    if(notesEl) notesEl.style.display=notesEl.style.display==='none'?'':'none';
  }
}

function openObjNoteEdit(objId,ni){
  const ri=objects.findIndex(o=>String(o.id)===String(objId));
  if(ri<0)return;
  // Find DOM slot
  const wrap=[...document.querySelectorAll('[data-objid]')]
    .find(w=>String(w.dataset.objid)===String(objId));
  const slot=wrap?parseInt(wrap.id.replace('wrap-','')):-1;
  if(slot<0){
    // fallback: open note edit modal directly
    noteEditCtx={ri,slot:ri,ni};
    document.getElementById('ne-text').value=objects[ri].notes[ni].text||'';
    document.getElementById('ne-date').value=objects[ri].notes[ni].time?objects[ri].notes[ni].time.slice(0,10):'';
    document.getElementById('ne-err').style.display='none';
    document.getElementById('noteEditModal').dataset.mode='obj';
    document.getElementById('noteEditModal').classList.add('open');
    return;
  }
  openNoteEditModal(slot,ni);
}

async function deleteObjNoteById(objId,ni){
  const ri=objects.findIndex(o=>String(o.id)===String(objId));
  if(ri<0)return;
  addHistory({type:'note',action:'delete',label:objects[ri].notes[ni].text,parentName:objects[ri].name,objId,data:{...objects[ri].notes[ni]}});
  objects[ri].notes.splice(ni,1);
  // update DOM notes block if visible
  const wrap=[...document.querySelectorAll('[data-objid]')]
    .find(w=>String(w.dataset.objid)===String(objId));
  if(wrap){
    const slot=parseInt(wrap.id.replace('wrap-',''));
    const notesEl=document.getElementById('notes-'+slot);
    if(notesEl) notesEl.innerHTML=buildNotesHTML(objects[ri],slot);
  }
  renderRandomNotes();
  apiSave(objects[ri]).catch(e=>console.error(e));
}

function toggleRandomDt(col){
  const row=document.getElementById('randomDtRow'+col);
  const btn=document.getElementById('randomDtBtn'+col);
  if(!row)return;
  if(row.classList.contains('vis')){row.classList.remove('vis');btn.textContent='+ нагадати';}
  else{row.classList.add('vis');btn.textContent='− прибрати';}
}

async function addRandomNote(col){
  col=col||0;
  const inp=document.getElementById('randomAddInput'+col);
  const text=inp.value.trim();if(!text)return;
  const date=document.getElementById('randomDtDate'+col).value;
  const time=date?date+'T09:00':'';
  const sn={id:'sticky_'+Date.now(),name:text,col,addr:String(col),stage:'',status:'',pack:'',area:'',notes:time?[{text,time}]:[]};
  stickyNotes.push(sn);
  inp.value='';
  document.getElementById('randomDtDate'+col).value='';
  const dtRow=document.getElementById('randomDtRow'+col);
  if(dtRow)dtRow.classList.remove('vis');
  document.getElementById('randomDtBtn'+col).textContent='+ нагадати';
  renderRandomNotes();
  apiSave(sn).catch(e=>console.error('save random note',e));
}

async function deleteRandomNote(idx){
  const sn=stickyNotes[idx];
  addHistory({type:'randomNote',action:'delete',label:sn.name,data:{...sn,notes:sn.notes?[...sn.notes]:[]}});
  const id=sn.id;
  stickyNotes.splice(idx,1);
  renderRandomNotes();
  apiDelete(id);
}

function openEditModal(i){
  const wrap=document.getElementById('wrap-'+i);

  document.getElementById('f-addr').value=o.addr||'';

  document.getElementById('f-link-folder').value=o.linkFolder||'';
  document.getElementById('f-start').value=o.dateStart||'';
  document.getElementById('f-end').value=o.dateEnd||'';
  document.getElementById('f-inwork').checked=!!o.inwork;
  document.getElementById('f-completed').checked=!!o.completed;
  document.getElementById('f-masters').checked=!!o.masters;

  document.getElementById('addModal').classList.add('open');
}
function closeAddModal(){document.getElementById('addModal').classList.remove('open')}

async function saveCard(){
  const btn=document.getElementById('btnSaveObj');
  try{
  btn.disabled=true;btn.textContent='Збереження...';
  const obj={
    name:document.getElementById('f-name').value.trim()||'Без назви',
    addr:document.getElementById('f-addr').value.trim(),
    stage:document.getElementById('f-stage').value,
    status:document.getElementById('f-status').value,
    pack:document.getElementById('f-pack').value,
    area:document.getElementById('f-area').value,
    inwork:document.getElementById('f-inwork').checked,
    completed:document.getElementById('f-completed').checked,
    masters:document.getElementById('f-masters').checked,
    mastersName:document.getElementById('f-masters-name').value.trim(),
    linkProject:editIdx!==null?(objects[editIdx].linkProject||''):'',
    linkFolder:document.getElementById('f-link-folder').value.trim(),
    dateStart:document.getElementById('f-start').value,
    dateEnd:document.getElementById('f-end').value,
    notes:editIdx!==null?(objects[editIdx].notes||[]):[]
  };
  if(editIdx!==null){obj.id=objects[editIdx].id;await apiSave(obj);objects[editIdx]=obj;}
  else{await apiSave(obj);objects.push(obj);}
  btn.disabled=false;btn.textContent='Зберегти';
  closeAddModal();expandedId=null;render();
  }catch(err){
    console.error('saveCard error:',err);
    btn.disabled=false;btn.textContent='Зберегти';
    alert('Помилка збереження: '+err.message);
  }
}

async function deleteCard(i){
  const wrap=document.getElementById('wrap-'+i);
  const oid=wrap?wrap.dataset.objid:null;
  const ri=oid!==null?objIdx(oid):i;
  if(ri<0||ri>=objects.length)return;
  if(!confirm('Видалити "'+objects[ri].name+'"?'))return;
  addHistory({type:'obj',action:'delete',label:objects[ri].name,data:{...objects[ri],notes:[...(objects[ri].notes||[])]}});
  const id=objects[ri].id;expandedId=null;objects.splice(ri,1);render();
  await apiDelete(id);
}

async function seedIfEmpty(){

  setSyncStatus('syncing','Dodaemo obiekty...');
  for(const obj of SEED_OBJECTS){
    obj.id='seed_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);

    await apiSave(obj);
    objects.push({...obj});
  }

  render();
}
